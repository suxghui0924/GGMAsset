<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GGM 경기게임마이스터고 프리미엄 유니티 에셋 라이브러리">
    <meta name="referrer" content="origin">
    <title>GGM 에셋 볼트 - 유니티 에셋 스토어 스타일</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="light-theme">
    <nav class="navbar">
        <div class="nav-container">
            <div class="brand">GGM <span class="accent">Asset Vault</span></div>
            <div class="search-bar-top">
                <input type="text" id="searchInput" placeholder="에셋 검색...">
                <button type="button" class="search-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>
            <div class="nav-links">
                <button type="button" class="login-btn">로그인</button>
                <button type="button" class="signup-btn">회원가입</button>
            </div>
        </div>
    </nav>

    <div class="main-layout container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h3 class="sidebar-title">카테고리</h3>
            <ul class="category-list" id="categoryList">
                <li class="active" data-category="all">전체보기</li>
                <li data-category="2D">2D</li>
                <li data-category="3D">3D</li>
                <li data-category="VFX">VFX</li>
                <li data-category="UI">UI/GUI</li>
                <li data-category="Misc">기타</li>
            </ul>
        </aside>

        <!-- Main Content -->
        <section class="content-area">
            <div class="content-header">
                <h1 id="pageTitle">모든 카테고리의 에셋</h1>

                <div class="filter-bar">
                    <div class="filter-group">
                        <button type="button" id="resetFilters" class="btn-reset">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M23 4v6h-6"></path>
                                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                            </svg>
                            필터 초기화
                        </button>
                    </div>
                    <div class="sort-group">
                        <span class="sort-label">정렬 기준</span>
                        <select id="sortSelect" class="filter-select">
                            <option value="name">이름순</option>
                            <option value="newest">최신순 (ID순)</option>
                        </select>
                    </div>
                </div>

                <div class="results-meta">
                    <span id="resultCount">로딩 중...</span>
                </div>
            </div>

            <div class="asset-grid" id="assetGrid">
                <!-- 에셋 카드 삽입 영역 -->
            </div>

            <div id="noResults" class="no-results hidden">
                <h2>일치하는 에셋이 없습니다</h2>
                <p>다른 검색어나 카테고리를 선택해 보세요.</p>
            </div>
        </section>
    </div>

    <footer class="footer">
        <p>GGM Asset Vault © 2026 | 경기게임마이스터고 에셋 저장소</p>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
